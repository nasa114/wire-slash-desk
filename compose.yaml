# デプロイ用 compose(開発環境は .devcontainer/compose.yml — こちらとは独立)。
#
# 使い方:
#   1. リポジトリ直下に .env を作成(必須: POSTGRES_PASSWORD, MCP_BEARER_TOKEN, COLLECTOR_TOKEN)
#   2. docker compose up -d --build
#   3. 初回のみ、信頼できるネットワークから http://<host>:3000/ を開き /setup で管理ユーザーを作成
#      (docs/004_KnownLimitations.md §6 — セットアップ完了前に公開網へ晒さないこと)
#
# TLS 終端はこの compose の外(リバースプロキシ / PaaS)の責務。そのため app の
# ポートは既定でループバックのみに束縛する(docs/004_KnownLimitations.md §2)。
# HTTPS なしの LAN 内検証では SESSION_COOKIE_SECURE=false を .env で明示する。
#
# SSRF egress 分離: app は internal 網(internet 直行不可)に隔離し、外向き通信は
# squid(egress 網)経由のみに限定する。squid が内部/予約 IP 帯を宛先とする通信を
# 拒否し、DNS リバインディングを含む SSRF を network 層で塞ぐ(deploy/squid/squid.conf)。
# アプリ側でも feed_url のプライベート/予約 IP リテラル直指定を拒否する(多層防御)。
# 注意: internal: true の網だけに属するコンテナは Docker がポート公開(ports)を行わない
# (docker compose ps で "3000/tcp" とだけ表示され、ホストへの束縛が無い状態になる)。
# そのため app は受信専用の ingress 網(非 internal・NAT マスカレード無効)にも接続する。
# マスカレード無効により app 発のインターネット向け通信はこの網を通れず、egress は
# 引き続き squid 経由のみ。デプロイ先で受信到達性(リバースプロキシ→127.0.0.1:3000)と
# 「app から squid を迂回した外部到達ができないこと」を必ず確認すること。
#
# 収集トリガー(設計書 §8: 外部から POST /internal/collect、冪等)を compose 内で
# 完結させたい場合は cron プロファイルを有効化する:
#   docker compose --profile cron up -d

name: personal-rss-reader

services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rss}
      POSTGRES_USER: ${POSTGRES_USER:-rss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD を .env に設定してください}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      # $$ でエスケープし、compose 側でなくコンテナ内シェルで環境変数を解決する
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # マイグレーションを1回だけ実行して終了する(app はこれの成功を待つ)
  migrate:
    build: .
    restart: "no"
    command: ["npm", "run", "migrate"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rss}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rss}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    ports:
      # 既定はループバックのみ(TLS 終端プロキシ経由での公開を前提)。
      # LAN へ直接開く場合は .env で APP_BIND=0.0.0.0 を明示する。
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rss}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rss}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:?MCP_BEARER_TOKEN を .env に設定してください (openssl rand -hex 32)}
      COLLECTOR_TOKEN: ${COLLECTOR_TOKEN:?COLLECTOR_TOKEN を .env に設定してください (openssl rand -hex 32)}
      CACHE_FULLTEXT: ${CACHE_FULLTEXT:-false}
      COLLECTOR_CONTACT: ${COLLECTOR_CONTACT:-}
      # NODE_ENV=production のため既定 true(HTTPS 前提)。HTTP 検証時のみ false を明示。
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      # egress は squid プロキシ経由に限定する(SSRF 対策。docs/004_KnownLimitations.md §1/§5/§8)。
      # app は internal(内部通信)+ ingress(受信専用)に属し、インターネットへは squid 経由でしか出られない。
      TRUST_EGRESS_PROXY: "true"
      HTTP_PROXY: http://squid:3128
      HTTPS_PROXY: http://squid:3128
      http_proxy: http://squid:3128
      https_proxy: http://squid:3128
      # 迂回はループバックのみ(healthcheck 用)。DB 等の内部サービス名は入れないこと
      # (入れると feed 取得が squid を迂回して内部へ到達し得る)。
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
      # undici(fetch)に proxy env を読ませる。プロセス起動時に必要(compose environment なら有効)。
      NODE_USE_ENV_PROXY: "1"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      squid:
        condition: service_healthy
    networks:
      - internal
      - ingress # 受信専用(これが無いと internal のみとなり ports が公開されない)

  # egress プロキシ(SSRF 対策)。app の唯一のインターネット出口。
  # 内部/予約 IP 帯を宛先とする通信を拒否する(deploy/squid/squid.conf、denylist 方式)。
  # squid は「解決する主体=接続する主体」なので、DNS リバインディング(§1)も構造的に塞ぐ。
  squid:
    image: ubuntu/squid:latest
    restart: unless-stopped
    volumes:
      - ./deploy/squid/squid.conf:/etc/squid/squid.conf:ro
      - squid-logs:/var/log/squid
    networks:
      - internal # app からの接続を受ける
      - egress # インターネットへ出る
    healthcheck:
      test: ["CMD-SHELL", "squid -k check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 任意: 収集の定期トリガー(--profile cron で有効化)。
  # GitHub Actions schedule / cloud timer を使う場合はこのサービスは不要(設計書 §8 D7)。
  collector-cron:
    profiles: ["cron"]
    image: curlimages/curl:8.14.1
    restart: unless-stopped
    environment:
      COLLECTOR_TOKEN: ${COLLECTOR_TOKEN}
      COLLECT_INTERVAL_SECONDS: ${COLLECT_INTERVAL_SECONDS:-900}
    command:
      - sh
      - -c
      - |
        sleep 30
        while true; do
          curl -fsS -m 300 -X POST -H "X-Collector-Token: $${COLLECTOR_TOKEN}" \
            http://app:3000/internal/collect > /dev/null \
            || echo "collect failed: $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sleep "$${COLLECT_INTERVAL_SECONDS}"
        done
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

networks:
  # 内部網: インターネットへの直接経路を持たない(internal: true)。
  # db / migrate / app / collector-cron はここだけに属し、外部到達は squid 経由に限定される。
  internal:
    driver: bridge
    internal: true
  # egress 網: squid のみが属し、インターネットへの経路を持つ。
  egress:
    driver: bridge
  # ingress 網: app の受信(ポート公開)専用。internal: true だと Docker はポート公開を
  # 行わないため非 internal とするが、NAT マスカレードを無効化して app 発の外向き通信が
  # この網からインターネットへ出られないようにする(公開ポートへの着信応答は conntrack で
  # 戻るため影響なし)。残存リスク: app からブリッジのゲートウェイ IP(ホスト自身)への到達は
  # 可能なため、ホスト上のサービスは 127.0.0.1 束縛か FW で保護すること。
  ingress:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  pg-data:
  squid-logs:
