# =====================================================================
# 本番デプロイ用 Squid 設定(compose.yaml の egress プロキシ)
#
# 開発用(.devcontainer/squid/squid.conf)とは別管理。開発用は「ドメイン許可リスト」
# だが、RSS リーダーは任意の公開フィードへ到達する必要があるため、本番は
# 「内部/予約 IP 帯を宛先とする通信を拒否する denylist」方式を採る(最小限のブロック)。
#
# SSRF 上の要点: squid は「名前解決する主体」と「接続する主体」が同一のため、
# dst ACL は解決後の宛先 IP で判定し、その同じ IP へ接続する。したがって
# アプリ側の DNS 事前解決に残る DNS リバインディング TOCTOU を構造的に塞げる
# (docs/004_KnownLimitations.md §1)。この denylist は http と CONNECT の双方に効かせる。
# =====================================================================

http_port 3128
visible_hostname rss-egress-proxy

# ---- ポート ----
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# ---- 送信元: 内部 docker ネットワークのコンテナのみ ----
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

# ---- 宛先: 内部/予約帯は拒否(SSRF egress フィルタの本体) ----
# 一般的な private/loopback/link-local/CGNAT に加え、アプリの isPrivateIPv4 が
# 取りこぼす IANA special-purpose 帯(192.0.0.0/24, 198.18.0.0/15, 240/4, multicast 等)も塞ぐ。
acl to_internal dst 0.0.0.0/8
acl to_internal dst 10.0.0.0/8
acl to_internal dst 100.64.0.0/10
acl to_internal dst 127.0.0.0/8
acl to_internal dst 169.254.0.0/16
acl to_internal dst 172.16.0.0/12
acl to_internal dst 192.0.0.0/24
acl to_internal dst 192.0.2.0/24
acl to_internal dst 192.168.0.0/16
acl to_internal dst 198.18.0.0/15
acl to_internal dst 198.51.100.0/24
acl to_internal dst 203.0.113.0/24
acl to_internal dst 224.0.0.0/4
acl to_internal dst 240.0.0.0/4
acl to_internal dst 255.255.255.255/32

# IPv6 は宛先・送信元とも遮断する(::ffff: マップ経由の内部到達や
# 予約帯の網羅漏れを避けるため、開発用と同様にまるごと拒否する)。
acl to_v6 dst ::/0
acl src_v6 src ::/0

# ---- アクセス制御(deny を先に評価する) ----
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access deny to_v6
http_access deny src_v6
http_access deny to_internal
http_access allow localnet
http_access deny all

# ---- DNS / タイムアウト ----
dns_nameservers 1.1.1.1 8.8.8.8
dns_v4_first on
prefer_direct on
connect_timeout 30 seconds
read_timeout 120 seconds
request_timeout 120 seconds

# ---- キャッシュ(フィードは都度取得。ディスクキャッシュは持たない) ----
cache deny all
maximum_object_size 0 KB

# ---- ログ ----
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
# 拒否(403/TCP_DENIED)を別ファイルに残し、SSRF 試行の監査に使う。
acl denied_requests http_status 403
access_log /var/log/squid/denied.log squid denied_requests

coredump_dir /var/spool/squid
error_directory /usr/share/squid/errors/en
