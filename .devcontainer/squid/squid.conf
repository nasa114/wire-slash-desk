# Squid プロキシ設定ファイル
# 開発環境用 - 内部ネットワークからのインターネットアクセスを制御

# =====================================================
# ネットワーク設定
# =====================================================

# プロキシポート設定
http_port 3128

# =====================================================
# ACL（アクセス制御リスト）定義
# =====================================================

# 標準的なACL定義
acl SSL_ports port 443
acl Safe_ports port 80          # HTTP
acl Safe_ports port 21          # FTP
acl Safe_ports port 443         # HTTPS
acl Safe_ports port 70          # Gopher
acl Safe_ports port 210         # WAIS
acl Safe_ports port 11434         # WAIS
# IPv6 を完全に禁止する（クライアントおよび宛先双方をブロック）
acl IPv6_src src ::/0
acl IPv6_dst dst ::/0
http_access deny IPv6_src
http_access deny IPv6_dst

# 予約されていないポート（IPv4 専用扱い）
acl Safe_ports port 1025-65535  # 予約されていないポート
acl Safe_ports port 280         # http-mgmt
acl Safe_ports port 488         # gss-http
acl Safe_ports port 591         # filemaker
acl Safe_ports port 777         # multiling http
acl CONNECT method CONNECT

# 内部ネットワークからのアクセスを許可
# Docker内部ネットワーク用（internal network）
acl localnet src 172.16.0.0/12  # RFC 1918 possible internal network
acl localnet src 192.168.0.0/16 # RFC 1918 possible internal network
acl localnet src 10.0.0.0/8     # RFC 1918 possible internal network
acl localnet src 169.254.0.0/16 # RFC 3927 link-local (APIPA) machines
acl localnet src fc00::/7       # RFC 4193 local private network range
acl localnet src fe80::/10      # RFC 4291 link-local (directly plugged) machines

# 許可ドメインリスト（外部ファイルから読み込み）
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# 許可するHTTPメソッド
acl Safe_methods method GET HEAD POST PUT DELETE OPTIONS CONNECT PATCH

# =====================================================
# アクセス制御ルール
# =====================================================

# 安全でないHTTPメソッドを拒否
http_access deny !Safe_methods

# 安全でないポートへのアクセスを拒否
http_access deny !Safe_ports

# CONNECT メソッドは SSL ポートのみ許可
http_access deny CONNECT !SSL_ports

# localhost からの管理アクセスを許可
http_access allow localhost manager
http_access deny manager

# 許可されたドメインへのアクセスのみ許可（内部ネットワークから）
http_access allow localnet allowed_domains

# localhost からのアクセスを許可
http_access allow localhost

# その他すべてのアクセスを拒否
http_access deny all

# =====================================================
# SSL/TLS 設定
# =====================================================

# SSL Bump 設定（HTTPS通信の検査）
# 開発環境では無効化（証明書エラーを避ける）
# ssl_bump splice all

# =====================================================
# キャッシュ設定
# =====================================================

# キャッシュディレクトリ設定
cache_dir ufs /var/spool/squid 100 16 256

# キャッシュサイズ制限
maximum_object_size 50 MB
cache_mem 64 MB

# =====================================================
# ログ設定
# =====================================================

# アクセスログ（詳細形式）
access_log /var/log/squid/access.log squid

# 拒否されたアクセスのログ（デバッグ用）
# TCP_DENIED を含むアクセスを別ファイルに記録
acl denied_requests http_status 403
access_log /var/log/squid/denied.log squid denied_requests

# キャッシュログ
cache_log /var/log/squid/cache.log

# キャッシュストアログ
cache_store_log /var/log/squid/store.log

# ログローテーション設定
logfile_rotate 10

# デバッグオプション（必要に応じてコメント解除）
# debug_options ALL,1 28,3
# セクション28: アクセス制御のデバッグ
# debug_options ALL,1: すべてのセクションでレベル1（エラーのみ）
# 28,3: セクション28（アクセス制御）でレベル3（詳細）

# =====================================================
# パフォーマンス設定
# =====================================================

# DNS設定
dns_nameservers 1.1.1.1 8.8.8.8
dns_v4_first on

# 接続タイムアウト（延長してクライアントやサーバ側の遅延での中断を防ぐ）
connect_timeout 60 seconds
read_timeout 600 seconds
request_timeout 600 seconds

# 永続接続設定（サーバおよびクライアントのキープアライブを有効にして再接続を減らす）
server_persistent_connections on
client_persistent_connections on

# 重複転送の縮小（同一リソースへの同時要求をまとめる）
collapsed_forwarding on

# =====================================================
# その他の設定
# =====================================================

# ホスト名
visible_hostname squid-proxy
# TCP_MISS_ABORTED の調査・緩和用設定

# ファイルディスクリプタ上限を引き上げ（FD枯渇による中断を防ぐ）
max_filedesc 4096

# IPv6 経路問題回避のためまず IPv4 を試す
prefer_direct on
tcp_outgoing_address 0.0.0.0

# ヘッダをログに残す（中断時のリクエスト／レスポンス解析に有用）
log_mime_hdrs on

# アクセス制御や接続周りの詳細デバッグを一時的に上げる
# （調査後は元のレベルに戻すこと）
# debug_options ALL,1 33,5 28,9

# 中断ログを別ファイルへ（調査しやすくする）
access_log /var/log/squid/aborted.log squid

# タイムアウトを少し延長（遅いクライアント／サーバによる切断を軽減）
connect_timeout 120 seconds
read_timeout 900 seconds
request_timeout 900 seconds
# エラーページの言語
error_directory /usr/share/squid/errors/en

# コアダンプディレクトリ
coredump_dir /var/spool/squid

# リフレッシュパターン（デフォルト設定）
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern -i (/cgi-bin/|\?) 0     0%      0
refresh_pattern .               0       20%     4320
